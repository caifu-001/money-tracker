<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="记账助手">
  <title>记账助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 登录页面 -->
  <div id="login-page" class="login-container">
    <div class="login-box">
      <div class="login-logo">💰</div>
      <h1 class="login-title">记账助手</h1>
      
      <div class="login-tabs">
        <div class="login-tab active" data-tab="login">登录</div>
        <div class="login-tab" data-tab="register">注册</div>
        <div class="login-tab" data-tab="reset">找回密码</div>
      </div>
      
      <form id="login-form" class="login-form active">
        <input type="text" id="login-username" class="login-input" placeholder="用户名" required>
        <input type="password" id="login-password" class="login-input" placeholder="密码" required>
        <button type="submit" class="login-btn">登录</button>
        <p class="login-error" id="login-error"></p>
      </form>
      
      <form id="register-form" class="login-form">
        <input type="text" id="reg-username" class="login-input" placeholder="用户名" required>
        <input type="password" id="reg-password" class="login-input" placeholder="密码（至少6位）" required minlength="6">
        <input type="password" id="reg-password2" class="login-input" placeholder="确认密码" required>
        <button type="submit" class="login-btn">注册</button>
        <p class="login-success" id="reg-success"></p>
        <p class="login-error" id="reg-error"></p>
      </form>
      
      <form id="reset-form" class="login-form">
        <input type="text" id="reset-username" class="login-input" placeholder="用户名" required>
        <input type="password" id="reset-password" class="login-input" placeholder="新密码（至少6位）" required minlength="6">
        <input type="password" id="reset-password2" class="login-input" placeholder="确认新密码" required>
        <button type="submit" class="login-btn">重置密码</button>
        <p class="login-success" id="reset-success"></p>
        <p class="login-error" id="reset-error"></p>
      </form>
      
      <p style="margin-top: 1.5rem; text-align: center; color: #6b7280; font-size: 0.75rem;">
        管理员: admin / admin123
      </p>
    </div>
  </div>
  
  <!-- 主应用 -->
  <div id="app-page" class="hidden">
    <nav class="navbar">
      <h1>
        <span>💰 记账助手</span>
        <div class="user-menu">
          <button class="user-btn" id="user-btn">
            <span id="current-username">用户</span>
            <span>▼</span>
          </button>
          <div class="user-dropdown" id="user-dropdown">
            <button id="btn-settings">⚙️ 设置</button>
            <button id="btn-admin" class="hidden">👥 用户管理</button>
            <button id="btn-logout">🚪 退出登录</button>
          </div>
        </div>
      </h1>
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="dashboard">概览</button>
        <button class="nav-tab" data-tab="transactions">记账</button>
        <button class="nav-tab" data-tab="statistics">统计</button>
        <button class="nav-tab" data-tab="budget">预算</button>
      </div>
    </nav>
    
    <div class="container">
      <div id="pending-alert" class="alert alert-warning hidden">
        ⚠️ 您的账号正在等待管理员审核
      </div>
      
      <!-- 概览页 -->
      <section id="dashboard" class="page">
        <div class="page-title">
          <span>月度概览</span>
          <input type="month" id="dashboard-month" class="form-input" style="width: auto;">
        </div>
        <div class="stats-grid">
          <div class="stat-card green">
            <div class="stat-label">本月收入</div>
            <div class="stat-value green" id="stat-income">¥0.00</div>
          </div>
          <div class="stat-card red">
            <div class="stat-label">本月支出</div>
            <div class="stat-value red" id="stat-expense">¥0.00</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-label">本月结余</div>
            <div class="stat-value blue" id="stat-balance">¥0.00</div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">最近交易</div>
          <div id="recent-transactions"></div>
        </div>
      </section>
      
      <!-- 记账页 -->
      <section id="transactions" class="page hidden">
        <div class="page-title">
          <span>记账</span>
          <div class="flex gap-2">
            <input type="month" id="transactions-month" class="form-input" style="width: auto;">
            <button class="btn btn-primary" id="btn-add">+ 添加</button>
          </div>
        </div>
        <div class="card">
          <div id="transactions-list"></div>
        </div>
      </section>
      
      <!-- 统计页 -->
      <section id="statistics" class="page hidden">
        <div class="page-title">统计分析</div>
        
        <div class="card">
          <div class="card-title">🔍 搜索统计</div>
          <div class="search-box">
            <input type="text" id="search-keyword" class="form-input" placeholder="搜索类别或备注...">
            <select id="search-type" class="form-select">
              <option value="">全部</option>
              <option value="income">收入</option>
              <option value="expense">支出</option>
            </select>
            <button class="btn btn-primary" id="btn-search">搜索</button>
          </div>
          <div id="search-results"></div>
        </div>
        
        <div class="card">
          <div class="card-title">📊 支出分布</div>
          <div id="pie-chart" class="chart-container"></div>
        </div>
        
        <div class="card">
          <div class="card-title">📈 月度对比</div>
          <div id="bar-chart" class="chart-container"></div>
        </div>
      </section>
      
      <!-- 预算页 -->
      <section id="budget" class="page hidden">
        <div class="page-title">预算管理</div>
        <div class="card">
          <div class="card-title">月度预算</div>
          <div class="flex gap-2 align-center">
            <input type="number" id="budget-input" class="form-input" placeholder="0.00" style="width: 150px;">
            <span>元</span>
            <button class="btn btn-primary" id="btn-save-budget">保存</button>
          </div>
          <div id="budget-progress" class="hidden" style="margin-top: 1rem;">
            <div class="flex-between mb-2">
              <span>已使用</span>
              <span id="budget-used"></span>
            </div>
            <div class="budget-bar">
              <div class="budget-bar-fill" id="budget-bar-fill"></div>
            </div>
            <p id="budget-status" class="text-sm mt-2"></p>
          </div>
        </div>
      </section>
      
      <!-- 设置页 -->
      <section id="settings" class="page hidden">
        <div class="page-title">设置</div>
        <div class="card">
          <div class="card-title">自定义类别</div>
          <div class="mb-4">
            <button class="btn btn-primary" id="btn-add-category">+ 添加类别</button>
          </div>
          <div id="custom-categories-list"></div>
        </div>
      </section>
      
      <!-- 用户管理页 -->
      <section id="admin" class="page hidden">
        <div class="page-title">用户管理</div>
        <div class="card">
          <div class="card-title">待审核用户</div>
          <div id="pending-users"></div>
        </div>
        <div class="card">
          <div class="card-title">所有用户</div>
          <div id="all-users"></div>
        </div>
      </section>
    </div>
    
    <button class="fab hidden" id="fab-add">+</button>
  </div>
  
  <!-- 记账模态框 -->
  <div class="modal-overlay hidden" id="transaction-modal">
    <div class="modal">
      <h3 class="modal-title" id="modal-title">添加记录</h3>
      <form id="transaction-form">
        <input type="hidden" id="transaction-id">
        <div class="type-toggle">
          <button type="button" class="type-btn expense active" data-type="expense">支出</button>
          <button type="button" class="type-btn income" data-type="income">收入</button>
        </div>
        <input type="number" step="0.01" id="amount" class="form-input" placeholder="金额" required>
        <div class="category-grid" id="category-grid"></div>
        <input type="date" id="date" class="form-input" required>
        <input type="text" id="note" class="form-input" placeholder="备注（可选）">
        <div class="flex gap-2 mt-4">
          <button type="button" class="btn btn-secondary" id="btn-cancel" style="flex: 1;">取消</button>
          <button type="submit" class="btn btn-primary" style="flex: 1;">保存</button>
        </div>
      </form>
    </div>
  </div>
  
  <!-- 类别模态框 -->
  <div class="modal-overlay hidden" id="category-modal">
    <div class="modal">
      <h3 class="modal-title">添加自定义类别</h3>
      <form id="category-form">
        <select id="category-type" class="form-select">
          <option value="expense">支出</option>
          <option value="income">收入</option>
        </select>
        <input type="text" id="category-name" class="form-input" placeholder="类别名称" required>
        <div class="form-group">
          <label class="form-label">选择图标（点击选中）：</label>
          <div class="icon-picker" id="icon-picker"></div>
        </div>
        <div class="preview-box">
          <span class="emoji" id="preview-emoji">🍔</span>
          <p class="text" id="preview-text">已选择</p>
        </div>
        <div class="flex gap-2 mt-4">
          <button type="button" class="btn btn-secondary" id="btn-category-cancel" style="flex: 1;">取消</button>
          <button type="submit" class="btn btn-primary" style="flex: 1;">添加</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
