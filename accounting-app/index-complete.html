<body>

      <form id="register-form" class="login-form">

      <form id="reset-form" class="login-form">

        <button type="submit" class="login-btn">重置密码</button>

      <p style="margin-top: 1.5rem; text-align: center; color: #6b7280; font-size: 0.75rem;">管理员: admin / admin123</p>

  </div>

<script>

const showApp = () => { $('#login-page').classList.add('hidden'); $('#app-page').classList.remove('hidden'); $('#current-username').textContent = currentUser.username; if(currentUser.status==='pending') $('#pending-alert').classList.remove('hidden'); if(currentUser.role==='admin'){ $('#btn-admin').classList.remove('hidden'); if(!$('[data-tab="admin"]')){ const tab=document.createElement('button'); tab.className='nav-tab'; tab.dataset.tab='admin'; tab.textContent='用户管理'; document.querySelector('.nav-tabs').appendChild(tab); tab.onclick=()=>switchTab('admin'); } } initApp(); };
const showLogin = () => { $('#login-page').classList.remove('hidden'); $('#app-page').classList.add('hidden'); currentUser=null; };
const login = async(u,p)=>{ try{ const d=await api.get('users','?username=eq.'+u); if(!d||d.length===0)return{success:false,error:'用户不存在'}; const us=d[0]; if(us.password!==simpleHash(p))return{success:false,error:'密码错误'}; if(us.status==='pending')return{success:false,error:'账号待审核'}; if(us.status==='rejected')return{success:false,error:'申请被拒绝'}; currentUser={id:us.id,username:us.username,role:us.role,status:us.status}; localStorage.setItem('currentUser',JSON.stringify(currentUser)); return{success:true}; }catch(e){return{success:false,error:'登录失败'};} };
const register = async(u,p)=>{ try{ const ex=await api.get('users','?username=eq.'+u); if(ex&&ex.length>0)return{success:false,error:'用户名已存在'}; await api.post('users',{id:generateId(),username:u,password:simpleHash(p),role:'user',status:'pending',created_at:new Date().toISOString()}); return{success:true}; }catch(e){return{success:false,error:'注册失败'};} };
const resetPassword = async(u,p)=>{ try{ const d=await api.get('users','?username=eq.'+u); if(!d||d.length===0)return{success:false,error:'用户不存在'}; await api.put('users',{password:simpleHash(p)},'?id=eq.'+d[0].id); return{success:true}; }catch(e){return{success:false,error:'重置失败'};} };
const logout = () => { localStorage.removeItem('currentUser'); showLogin(); };
const loadData = async() => { if(!currentUser)return; try{ const tx=await api.get('transactions','?user_id=eq.'+currentUser.id+'&order=date.desc'); transactions=tx||[]; const bd=await api.get('budgets','?user_id=eq.'+currentUser.id+'&limit=1'); if(bd&&bd.length>0)budgets={total:bd[0].total||0}; const cc=await api.get('custom_categories','?user_id=eq.'+currentUser.id); if(cc&&cc.length>0){ customCategories={income:[],expense:[]}; cc.forEach(c=>customCategories[c.type].push({id:c.id,name:c.name,icon:c.icon,custom:true})); mergeCategories(); } }catch(e){} };
const mergeCategories = () => { categories = { income: [...DEFAULT_CATEGORIES.income,...customCategories.income], expense: [...DEFAULT_CATEGORIES.expense,...customCategories.expense] }; };
const renderCategories = (type) => { const grid = $('#category-grid'); grid.innerHTML = categories[type].map(cat => `<button type="button" class="category-btn ${cat.id===selectedCategory?'selected':''}" data-id="${cat.id}"><span style="font-size:1.5rem;display:block;margin-bottom:0.25rem;">${cat.icon}</span><span style="font-size:0.75rem;">${cat.name}</span></button>`).join(''); grid.querySelectorAll('.category-btn').forEach(btn=>{ btn.onclick = () => { grid.querySelectorAll('.category-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); selectedCategory=btn.dataset.id; }; }); };
