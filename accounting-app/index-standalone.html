<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记账助手</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/tailwindcss/3.4.1/tailwind.min.js"></script>
  <style>
    * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .stat-card { transition: transform 0.2s, box-shadow 0.2s; }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .category-btn { transition: all 0.2s; }
    .category-btn:hover { transform: scale(1.05); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell, LineChart, Line } = Recharts;

    // 默认类别
    const CATEGORIES = {
      income: [
        { id: 'salary', name: '工资', icon: '💰', color: '#4CAF50' },
        { id: 'parttime', name: '兼职/副业', icon: '💼', color: '#8BC34A' },
        { id: 'investment', name: '投资理财', icon: '📈', color: '#CDDC39' },
        { id: 'gift', name: '礼金/红包', icon: '🎁', color: '#FFC107' },
        { id: 'other_income', name: '其他收入', icon: '💵', color: '#FF9800' }
      ],
      expense: [
        { id: 'food', name: '餐饮', icon: '🍔', color: '#F44336' },
        { id: 'transport', name: '交通', icon: '🚗', color: '#E91E63' },
        { id: 'shopping', name: '购物', icon: '🛒', color: '#9C27B0' },
        { id: 'living', name: '居住', icon: '🏠', color: '#673AB7' },
        { id: 'health', name: '医疗健康', icon: '💊', color: '#3F51B5' },
        { id: 'education', name: '教育培训', icon: '📚', color: '#2196F3' },
        { id: 'entertainment', name: '娱乐休闲', icon: '🎮', color: '#00BCD4' },
        { id: 'social', name: '社交人情', icon: '🤝', color: '#009688' },
        { id: 'other_expense', name: '其他支出', icon: '📦', color: '#795548' }
      ]
    };

    const COLORS = ['#4CAF50', '#F44336', '#2196F3', '#FF9800', '#9C27B0', '#00BCD4', '#FFC107', '#795548', '#607D8B'];

    // 存储工具
    const storage = {
      get: (key) => {
        try {
          const data = localStorage.getItem(key);
          return data ? JSON.parse(data) : null;
        } catch { return null; }
      },
      set: (key, value) => {
        localStorage.setItem(key, JSON.stringify(value));
      }
    };

    // 格式化货币
    const formatCurrency = (amount) => {
      return new Intl.NumberFormat('zh-CN', {
        style: 'currency',
        currency: 'CNY',
        minimumFractionDigits: 2
      }).format(amount);
    };

    // 格式化日期
    const formatDate = (date) => {
      const d = new Date(date);
      return d.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
    };

    // 生成ID
    const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);

    // 获取当前月份
    const getCurrentMonth = () => {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    };

    // 主应用
    function App() {
      const [transactions, setTransactions] = useState(() => storage.get('transactions') || []);
      const [budgets, setBudgets] = useState(() => storage.get('budgets') || { total: 0, categories: {} });
      const [activeTab, setActiveTab] = useState('dashboard');
      const [showAddModal, setShowAddModal] = useState(false);
      const [editingTransaction, setEditingTransaction] = useState(null);
      const [filterMonth, setFilterMonth] = useState(getCurrentMonth);

      // 保存数据
      useEffect(() => {
        storage.set('transactions', transactions);
      }, [transactions]);

      useEffect(() => {
        storage.set('budgets', budgets);
      }, [budgets]);

      // 过滤当月数据
      const monthlyTransactions = useMemo(() => {
        return transactions.filter(t => t.date.startsWith(filterMonth));
      }, [transactions, filterMonth]);

      // 统计数据
      const stats = useMemo(() => {
        const income = monthlyTransactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
        const expense = monthlyTransactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
        const balance = income - expense;
        
        // 分类统计
        const expenseByCategory = {};
        monthlyTransactions.filter(t => t.type === 'expense').forEach(t => {
          expenseByCategory[t.category] = (expenseByCategory[t.category] || 0) + t.amount;
        });
        
        const incomeByCategory = {};
        monthlyTransactions.filter(t => t.type === 'income').forEach(t => {
          incomeByCategory[t.category] = (incomeByCategory[t.category] || 0) + t.amount;
        });

        return { income, expense, balance, expenseByCategory, incomeByCategory };
      }, [monthlyTransactions]);

      // 添加交易
      const addTransaction = (transaction) => {
        if (editingTransaction) {
          setTransactions(transactions.map(t => t.id === editingTransaction.id ? { ...transaction, id: editingTransaction.id } : t));
          setEditingTransaction(null);
        } else {
          setTransactions([...transactions, { ...transaction, id: generateId() }]);
        }
        setShowAddModal(false);
      };

      // 删除交易
      const deleteTransaction = (id) => {
        if (confirm('确定要删除这条记录吗？')) {
          setTransactions(transactions.filter(t => t.id !== id));
        }
      };

      // 编辑交易
      const editTransaction = (transaction) => {
        setEditingTransaction(transaction);
        setShowAddModal(true);
      };

      // 饼图数据
      const pieData = useMemo(() => {
        return Object.entries(stats.expenseByCategory).map(([category, amount]) => {
          const cat = CATEGORIES.expense.find(c => c.id === category);
          return { name: cat ? cat.name : category, value: amount, color: cat ? cat.color : '#999' };
        });
      }, [stats.expenseByCategory]);

      // 趋势数据（最近6个月）
      const trendData = useMemo(() => {
        const months = [];
        for (let i = 5; i >= 0; i--) {
          const d = new Date();
          d.setMonth(d.getMonth() - i);
          const month = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
          months.push(month);
        }
        return months.map(month => {
          const monthTx = transactions.filter(t => t.date.startsWith(month));
          const income = monthTx.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
          const expense = monthTx.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
          return {
            month: month.slice(5),
            income,
            expense,
            balance: income - expense
          };
        });
      }, [transactions]);

      // 预算使用率
      const budgetUsage = useMemo(() => {
        if (!budgets.total) return 0;
        return Math.min(100, (stats.expense / budgets.total) * 100);
      }, [stats.expense, budgets.total]);

      return (
        <div className="min-h-screen bg-gray-100">
          {/* 顶部导航 */}
          <nav className="bg-indigo-600 text-white p-4 shadow-lg">
            <div className="max-w-6xl mx-auto flex items-center justify-between">
              <h1 className="text-xl font-bold">💰 记账助手</h1>
              <div className="flex gap-2">
                <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-2 rounded-lg transition ${activeTab === 'dashboard' ? 'bg-white text-indigo-600' : 'hover:bg-indigo-500'}`}>概览</button>
                <button onClick={() => setActiveTab('transactions')} className={`px-4 py-2 rounded-lg transition ${activeTab === 'transactions' ? 'bg-white text-indigo-600' : 'hover:bg-indigo-500'}`}>记账</button>
                <button onClick={() => setActiveTab('statistics')} className={`px-4 py-2 rounded-lg transition ${activeTab === 'statistics' ? 'bg-white text-indigo-600' : 'hover:bg-indigo-500'}`}>统计</button>
                <button onClick={() => setActiveTab('budget')} className={`px-4 py-2 rounded-lg transition ${activeTab === 'budget' ? 'bg-white text-indigo-600' : 'hover:bg-indigo-500'}`}>预算</button>
                <button onClick={() => setActiveTab('export')} className={`px-4 py-2 rounded-lg transition ${activeTab === 'export' ? 'bg-white text-indigo-600' : 'hover:bg-indigo-500'}`}>导出</button>
              </div>
            </div>
          </nav>

          <main className="max-w-6xl mx-auto p-4">
            {/* 概览页 */}
            {activeTab === 'dashboard' && (
              <div className="space-y-6">
                <div className="flex justify-between items-center">
                  <h2 className="text-2xl font-bold text-gray-800">月度概览</h2>
                  <input type="month" value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)} className="px-4 py-2 border rounded-lg" />
                </div>

                {/* 统计卡片 */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="stat-card bg-white p-6 rounded-xl shadow-md border-l-4 border-green-500">
                    <p className="text-gray-500 text-sm">本月收入</p>
                    <p className="text-2xl font-bold text-green-600">{formatCurrency(stats.income)}</p>
                  </div>
                  <div className="stat-card bg-white p-6 rounded-xl shadow-md border-l-4 border-red-500">
                    <p className="text-gray-500 text-sm">本月支出</p>
                    <p className="text-2xl font-bold text-red-600">{formatCurrency(stats.expense)}</p>
                  </div>
                  <div className="stat-card bg-white p-6 rounded-xl shadow-md border-l-4 border-indigo-500">
                    <p className="text-gray-500 text-sm">本月结余</p>
                    <p className={`text-2xl font-bold ${stats.balance >= 0 ? 'text-indigo-600' : 'text-red-600'}`}>{formatCurrency(stats.balance)}</p>
                  </div>
                </div>

                {/* 最近交易 */}
                <div className="bg-white rounded-xl shadow-md p-6">
                  <h3 className="text-lg font-bold mb-4">最近交易</h3>
                  {monthlyTransactions.length === 0 ? (
                    <p className="text-gray-500 text-center py-8">暂无记录，点击下方按钮添加</p>
                  ) : (
                    <div className="space-y-3">
                      {monthlyTransactions.slice(-5).reverse().map(t => {
                        const cat = CATEGORIES[t.type === 'income' ? 'income' : 'expense'].find(c => c.id === t.category);
                        return (
                          <div key={t.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg hover:bg-gray-100">
                            <div className="flex items-center gap-3">
                              <span className="text-2xl">{cat?.icon || '📝'}</span>
                              <div>
                                <p className="font-medium">{cat?.name || t.category}</p>
                                <p className="text-sm text-gray-500">{t.note || formatDate(t.date)}</p>
                              </div>
                            </div>
                            <div className="flex items-center gap-3">
                              <span className={`font-bold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}`}>
                                {t.type === 'income' ? '+' : '-'}{formatCurrency(t.amount)}
                              </span>
                              <button onClick={() => editTransaction(t)} className="text-indigo-600 hover:text-indigo-800 text-sm">编辑</button>
                              <button onClick={() => deleteTransaction(t.id)} className="text-red-600 hover:text-red-800 text-sm">删除</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* 记账页 */}
            {activeTab === 'transactions' && (
              <div className="space-y-6">
                <div className="flex justify-between items-center">
                  <h2 className="text-2xl font-bold text-gray-800">记账</h2>
                  <div className="flex gap-2">
                    <input type="month" value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)} className="px-4 py-2 border rounded-lg" />
                    <button onClick={() => { setEditingTransaction(null); setShowAddModal(true); }} className="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">+ 添加记录</button>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-md overflow-hidden">
                  {monthlyTransactions.length === 0 ? (
                    <p className="text-gray-500 text-center py-12">暂无记录</p>
                  ) : (
                    <table className="w-full">
                      <thead className="bg-gray-50">
                        <tr>
                          <th className="px-4 py-3 text-left text-sm font-medium text-gray-500">日期</th>
                          <th className="px-4 py-3 text-left text-sm font-medium text-gray-500">类别</th>
                          <th className="px-4 py-3 text-left text-sm font-medium text-gray-500">备注</th>
                          <th className="px-4 py-3 text-right text-sm font-medium text-gray-500">金额</th>
                          <th className="px-4 py-3 text-right text-sm font-medium text-gray-500">操作</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y">
                        {monthlyTransactions.map(t => {
                          const cat = CATEGORIES[t.type === 'income' ? 'income' : 'expense'].find(c => c.id === t.category);
                          return (
                            <tr key={t.id} className="hover:bg-gray-50">
                              <td className="px-4 py-3 text-sm">{formatDate(t.date)}</td>
                              <td className="px-4 py-3">
                                <span className="flex items-center gap-2">
                                  <span>{cat?.icon}</span>
                                  <span>{cat?.name}</span>
                                </span>
                              </td>
                              <td className="px-4 py-3 text-sm text-gray-600">{t.note || '-'}</td>
                              <td className={`px-4 py-3 text-right font-bold ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}`}>
                                {t.type === 'income' ? '+' : '-'}{formatCurrency(t.amount)}
                              </td>
                              <td className="px-4 py-3 text-right">
                                <button onClick={() => editTransaction(t)} className="text-indigo-600 hover:text-indigo-800 text-sm mr-2">编辑</button>
                                <button onClick={() => deleteTransaction(t.id)} className="text-red-600 hover:text-red-800 text-sm">删除</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>
            )}

            {/* 统计页 */}
            {activeTab === 'statistics' && (
              <div className="space-y-6">
                <h2 className="text-2xl font-bold text-gray-800">统计分析</h2>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {/* 支出分布 */}
                  <div className="bg-white rounded-xl shadow-md p-6">
                    <h3 className="text-lg font-bold mb-4">支出分布</h3>
                    {pieData.length === 0 ? (
                      <p className="text-gray-500 text-center py-8">暂无数据</p>
                    ) : (
                      <ResponsiveContainer width="100%" height={300}>
                        <PieChart>
                          <Pie data={pieData} cx="50%" cy="50%" outerRadius={100} dataKey="value" label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`}>
                            {pieData.map((entry, index) => <Cell key={entry.name} fill={entry.color} />)}
                          </Pie>
                          <Tooltip formatter={(value) => formatCurrency(value)} />
                        </PieChart>
                      </ResponsiveContainer>
                    )}
                  </div>

                  {/* 收支对比 */}
                  <div className="bg-white rounded-xl shadow-md p-6">
                    <h3 className="text-lg font-bold mb-4">收支对比</h3>
                    {trendData.every(d => d.income === 0 && d.expense === 0) ? (
                      <p className="text-gray-500 text-center py-8">暂无数据</p>
                    ) : (
                      <ResponsiveContainer width="100%" height={300}>
                        <BarChart data={trendData}>
                          <CartesianGrid strokeDasharray="3 3" />
                          <XAxis dataKey="month" />
                          <YAxis />
                          <Tooltip formatter={(value) => formatCurrency(value)} />
                          <Legend />
                          <Bar dataKey="income" name="收入" fill="#4CAF50" />
                          <Bar dataKey="expense" name="支出" fill="#F44336" />
                        </BarChart>
                      </ResponsiveContainer>
                    )}
                  </div>

                  {/* 趋势图 */}
                  <div className="bg-white rounded-xl shadow-md p-6 md:col-span-2">
                    <h3 className="text-lg font-bold mb-4">结余趋势</h3>
                    {trendData.every(d => d.income === 0 && d.expense === 0) ? (
                      <p className="text-gray-500 text-center py-8">暂无数据</p>
                    ) : (
                      <ResponsiveContainer width="100%" height={300}>
                        <LineChart data={trendData}>
                          <CartesianGrid strokeDasharray="3 3" />
                          <XAxis dataKey="month" />
                          <YAxis />
                          <Tooltip formatter={(value) => formatCurrency(value)} />
                          <Line type="monotone" dataKey="balance" name="结余" stroke="#4F46E5" strokeWidth={2} />
                        </LineChart>
                      </ResponsiveContainer>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* 预算页 */}
            {activeTab === 'budget' && (
              <div className="space-y-6">
                <h2 className="text-2xl font-bold text-gray-800">预算管理</h2>

                <div className="bg-white rounded-xl shadow-md p-6">
                  <h3 className="text-lg font-bold mb-4">月度预算</h3>
                  <div className="flex items-center gap-4 mb-6">
                    <label className="text-gray-600">本月预算：</label>
                    <input type="number" value={budgets.total || ''} onChange={(e) => setBudgets({ ...budgets, total: Number(e.target.value) })} placeholder="设置月度预算" className="flex-1 px-4 py-2 border rounded-lg" />
                    <span className="text-gray-600">元</span>
                  </div>

                  {budgets.total > 0 && (
                    <div className="mb-6">
                      <div className="flex justify-between text-sm mb-2">
                        <span>已使用</span>
                        <span>{formatCurrency(stats.expense)} / {formatCurrency(budgets.total)}</span>
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-4">
                        <div className={`h-4 rounded-full transition-all ${budgetUsage > 100 ? 'bg-red-500' : budgetUsage > 80 ? 'bg-yellow-500' : 'bg-green-500'}`} style={{ width: `${Math.min(100, budgetUsage)}%` }}></div>
                      </div>
                      <p className="text-sm text-gray-500 mt-2">
                        {budgetUsage >= 100 ? '⚠️ 已超支！' : budgetUsage > 80 ? `剩余 ${formatCurrency(budgets.total - stats.expense)}` : `剩余 ${formatCurrency(budgets.total - stats.expense)}`}
                      </p>
                    </div>
                  )}
                </div>

                {/* 分类支出 */}
                <div className="bg-white rounded-xl shadow-md p-6">
                  <h3 className="text-lg font-bold mb-4">分类支出明细</h3>
                  <div className="space-y-3">
                    {CATEGORIES.expense.map(cat => {
                      const amount = stats.expenseByCategory[cat.id] || 0;
                      const catBudget = budgets.categories?.[cat.id] || 0;
                      return (
                        <div key={cat.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                          <span className="flex items-center gap-2">
                            <span>{cat.icon}</span>
                            <span>{cat.name}</span>
                          </span>
                          <span className="font-bold text-red-600">{formatCurrency(amount)}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {/* 导出页 */}
            {activeTab === 'export' && (
              <div className="space-y-6">
                <h2 className="text-2xl font-bold text-gray-800">数据导出</h2>

                <div className="bg-white rounded-xl shadow-md p-6">
                  <h3 className="text-lg font-bold mb-4">导出数据</h3>
                  <p className="text-gray-600 mb-6">共 {transactions.length} 条记录</p>
                  
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <button onClick={() => exportToCSV()} className="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition">
                      📊 导出 CSV
                    </button>
                    <button onClick={() => exportToJSON()} className="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">
                      📄 导出 JSON
                    </button>
                    <button onClick={() => exportToExcel()} className="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition">
                      📈 导出 Excel
                    </button>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-md p-6">
                  <h3 className="text-lg font-bold mb-4">数据管理</h3>
                  <p className="text-gray-600 mb-4">危险操作，请谨慎使用</p>
                  <button onClick={clearAllData} className="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition">
                    🗑️ 清空所有数据
                  </button>
                </div>
              </div>
            )}
          </main>

          {/* 添加/编辑模态框 */}
          {showAddModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
                <h3 className="text-xl font-bold mb-6">{editingTransaction ? '编辑记录' : '添加记录'}</h3>
                <TransactionForm onSubmit={addTransaction} onCancel={() => { setShowAddModal(false); setEditingTransaction(null); }} editing={editingTransaction} />
              </div>
            </div>
          )}

          {/* 浮动添加按钮 */}
          <button onClick={() => { setEditingTransaction(null); setShowAddModal(true); }} className="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg hover:bg-indigo-700 transition text-2xl">+</button>
        </div>
      );
    }

    // 交易表单组件
    function TransactionForm({ onSubmit, onCancel, editing }) {
      const [type, setType] = useState(editing?.type || 'expense');
      const [amount, setAmount] = useState(editing?.amount || '');
      const [category, setCategory] = useState(editing?.category || 'food');
      const [date, setDate] = useState(editing?.date || new Date().toISOString().split('T')[0]);
      const [note, setNote] = useState(editing?.note || '');

      const categories = type === 'income' ? CATEGORIES.income : CATEGORIES.expense;

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!amount || amount <= 0) {
          alert('请输入有效金额');
          return;
        }
        onSubmit({ type, amount: Number(amount), category, date, note });
      };

      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">类型</label>
            <div className="flex gap-4">
              <button type="button" onClick={() => { setType('expense'); setCategory('food'); }} className={`flex-1 py-2 rounded-lg transition ${type === 'expense' ? 'bg-red-100 text-red-700 border-2 border-red-500' : 'bg-gray-100'}`}>支出</button>
              <button type="button" onClick={() => { setType('income'); setCategory('salary'); }} className={`flex-1 py-2 rounded-lg transition ${type === 'income' ? 'bg-green-100 text-green-700 border-2 border-green-500' : 'bg-gray-100'}`}>收入</button>
            </div>
          </div>

          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">金额</label>
            <input type="number" step="0.01" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0.00" className="w-full px-4 py-2 border rounded-lg" required />
          </div>

          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">类别</label>
            <div className="grid grid-cols-3 gap-2">
              {categories.map(cat => (
                <button type="button" key={cat.id} onClick={() => setCategory(cat.id)} className={`p-2 rounded-lg transition flex items-center gap-2 ${category === cat.id ? 'bg-indigo-100 border-2 border-indigo-500' : 'bg-gray-50 hover:bg-gray-100'}`}>
                  <span>{cat.icon}</span>
                  <span className="text-sm">{cat.name}</span>
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">日期</label>
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full px-4 py-2 border rounded-lg" required />
          </div>

          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">备注</label>
            <input type="text" value={note} onChange={(e) => setNote(e.target.value)} placeholder="可选" className="w-full px-4 py-2 border rounded-lg" />
          </div>

          <div className="flex gap-4 pt-4">
            <button type="button" onClick={onCancel} className="flex-1 py-2 border rounded-lg hover:bg-gray-50">取消</button>
            <button type="submit" className="flex-1 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">保存</button>
          </div>
        </form>
      );
    }

    // 导出函数
    function exportToCSV() {
      const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
      if (transactions.length === 0) { alert('暂无数据'); return; }
      
      const headers = ['日期', '类型', '类别', '金额', '备注'];
      const rows = transactions.map(t => {
        const cat = CATEGORIES[t.type === 'income' ? 'income' : 'expense'].find(c => c.id === t.category);
        return [t.date, t.type === 'income' ? '收入' : '支出', cat?.name || t.category, t.amount, t.note || ''];
      });
      
      const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
      downloadFile(csv, '账本数据.csv', 'text/csv');
    }

    function exportToJSON() {
      const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
      if (transactions.length === 0) { alert('暂无数据'); return; }
      
      const json = JSON.stringify(transactions, null, 2);
      downloadFile(json, '账本数据.json', 'application/json');
    }

    function exportToExcel() {
      const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
      if (transactions.length === 0) { alert('暂无数据'); return; }
      
      // 生成 HTML 表格格式的 Excel 文件
      let html = '<table><thead><tr><th>日期</th><th>类型</th><th>类别</th><th>金额</th><th>备注</th></tr></thead><tbody>';
      transactions.forEach(t => {
        const cat = CATEGORIES[t.type === 'income' ? 'income' : 'expense'].find(c => c.id === t.category);
        html += `<tr><td>${t.date}</td><td>${t.type === 'income' ? '收入' : '支出'}</td><td>${cat?.name || t.category}</td><td>${t.amount}</td><td>${t.note || ''}</td></tr>`;
      });
      html += '</tbody></table>';
      
      const excel = `<html><head><meta charset="utf-8"><style>table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;text-align:left}</style></head><body>${html}</body></html>`;
      downloadFile(excel, '账本数据.xls', 'application/vnd.ms-excel');
    }

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearAllData() {
      if (confirm('确定要清空所有数据吗？此操作不可恢复！')) {
        if (confirm('再次确认：所有数据将被永久删除！')) {
          localStorage.removeItem('transactions');
          localStorage.removeItem('budgets');
          window.location.reload();
        }
      }
    }

    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
